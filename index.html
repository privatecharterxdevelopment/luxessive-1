<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÈSSENCE — Contemporary Essentials</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Overlays -->
  <div class="overlay" id="cartOverlay"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer__header">
      <span class="cart-drawer__title">Cart</span>
      <button class="cart-drawer__close" id="cartClose" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cart-drawer__body" id="cartBody"></div>
    <div class="cart-drawer__footer" id="cartFooter"></div>
  </aside>

  <!-- App -->
  <main id="app"></main>

  <script src="script.js"></script>
</body>
</html>
