<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ÈSSENCE — Contemporary Essentials</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Overlays -->
  <div class="overlay" id="menuOverlay"></div>
  <div class="overlay" id="cartOverlay"></div>

  <!-- Header -->
  <header class="header">
    <div class="header__inner">
      <a href="#/" class="logo">ÈSSENCE</a>
      <nav class="nav-desktop">
        <a href="#/">New In</a>
        <a href="#/">Shop</a>
        <a href="#/">About</a>
      </nav>
      <div class="header__right">
        <button class="header__search" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
        </button>
        <button class="cart-btn" id="cartBtn" aria-label="Open cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="5" y="9" width="14" height="12" rx="1"/><path d="M8 9V7a4 4 0 0 1 8 0v2"/></svg>
          <span class="cart-count" id="cartCount">0</span>
        </button>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
          <span class="menu-toggle__icon"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Side Menu -->
  <aside class="side-menu" id="sideMenu">
    <div class="side-menu__inner">
      <div class="side-menu__header">
        <span class="side-menu__label">Menu</span>
      </div>
      <nav class="side-menu__nav">
        <div class="menu-group">
          <button class="menu-group__toggle"><span>Shop</span><span class="menu-plus"></span></button>
          <ul class="menu-group__list">
            <li><a href="#/">All</a></li>
            <li><a href="#/">Clothing</a></li>
            <li><a href="#/">Shoes</a></li>
            <li><a href="#/">Bags</a></li>
          </ul>
        </div>
        <div class="menu-group">
          <button class="menu-group__toggle"><span>Collections</span><span class="menu-plus"></span></button>
          <ul class="menu-group__list">
            <li><a href="#/">SS26</a></li>
            <li><a href="#/">AW25</a></li>
          </ul>
        </div>
        <a href="#/" class="menu-link">About</a>
        <a href="#/" class="menu-link">Contact</a>
      </nav>
      <div class="side-menu__footer">
        <a href="#">Instagram</a>
        <a href="#">Pinterest</a>
      </div>
    </div>
  </aside>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer__header">
      <h3 class="cart-drawer__title">Cart</h3>
      <button class="cart-drawer__close" id="cartClose" aria-label="Close cart">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="cart-drawer__body" id="cartBody"></div>
    <div class="cart-drawer__footer" id="cartFooter"></div>
  </aside>

  <!-- Main App -->
  <main id="app"></main>

  <script src="script.js"></script>
</body>
</html>
