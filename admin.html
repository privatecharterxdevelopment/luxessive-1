<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUXESSIVE — Admin</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">LUXESSIVE<span class="sidebar__badge">CRM</span></div>
    <nav class="sidebar__nav">
      <button class="sidebar__link is-active" data-tab="products"><span class="sidebar__icon">&#9634;</span> Products</button>
      <button class="sidebar__link" data-tab="orders"><span class="sidebar__icon">&#9776;</span> Orders</button>
    </nav>
    <div class="sidebar__footer">
      <a href="/" class="sidebar__link sidebar__link--muted"><span class="sidebar__icon">&larr;</span> Back to Shop</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <!-- Top bar -->
    <header class="topbar">
      <button class="topbar__menu" id="menuBtn">&#9776;</button>
      <h1 class="topbar__title" id="pageTitle">Products</h1>
      <div class="topbar__actions" id="topActions"></div>
    </header>

    <!-- Content -->
    <div class="content" id="content"></div>
  </main>

  <!-- Product Modal -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal" id="productModal">
    <div class="modal__header">
      <h2 class="modal__title" id="modalTitle">Add Product</h2>
      <button class="modal__close" id="modalClose">&times;</button>
    </div>
    <div class="modal__body" id="modalBody"></div>
  </div>

  <!-- Bulk Import Modal -->
  <div class="modal" id="bulkModal">
    <div class="modal__header">
      <h2 class="modal__title">Bulk Import</h2>
      <button class="modal__close" id="bulkClose">&times;</button>
    </div>
    <div class="modal__body">
      <p class="modal__hint">Paste a JSON array of products. Each object needs at least: <code>name</code>, <code>price</code>, <code>category</code>.</p>
      <textarea class="modal__textarea" id="bulkJson" rows="12" placeholder='[
  {
    "name": "Product Name",
    "price": 99,
    "category": "Clothing",
    "colors": [{"name":"Black","hex":"#111111"}],
    "sizes": ["S","M","L"],
    "description": "Description here"
  }
]'></textarea>
      <p class="modal__error" id="bulkError"></p>
      <button class="btn btn--primary" id="bulkImportBtn">Import Products</button>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
